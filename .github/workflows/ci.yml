name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,viewer]

      - name: Run offline tests (isolated per file)
        run: |
          python -c "
          import subprocess, sys, pathlib, time

          test_dir = pathlib.Path('tests')
          test_files = sorted(test_dir.glob('test_*.py'))
          marks = 'not hardware_live and not matlab_live'
          failed = []
          passed = []
          skipped = []

          for tf in test_files:
              name = tf.name
              print(f'\n===== STARTING {name} =====', flush=True)
              t0 = time.monotonic()
              result = subprocess.run(
                  [sys.executable, '-m', 'pytest', str(tf),
                   '-m', marks, '-v', '--tb=short'],
                  timeout=120,
                  creationflags=subprocess.CREATE_NEW_PROCESS_GROUP,
              )
              elapsed = time.monotonic() - t0
              rc = result.returncode
              if rc == 0:
                  status = 'PASS'
                  passed.append(name)
              elif rc == 5:
                  status = 'SKIP (all deselected)'
                  skipped.append(name)
              else:
                  status = f'FAIL(rc={rc})'
                  failed.append(name)
              print(f'===== {name}: {status} ({elapsed:.1f}s) =====', flush=True)

          print(f'\n===== SUMMARY =====')
          print(f'Passed: {len(passed)}')
          print(f'Skipped: {len(skipped)}')
          for s in skipped:
              print(f'  SKIP: {s}')
          print(f'Failed: {len(failed)}')
          for f in failed:
              print(f'  FAIL: {f}')
          if failed:
              sys.exit(1)
          "

      - name: Build distributions
        run: |
          python -m build

      - name: Check distributions
        run: |
          twine check --strict dist/*
